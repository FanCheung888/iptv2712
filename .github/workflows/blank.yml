name: M3u Fetch And Modify
on: 
  # 如需开启定时，取消下面注释并调整时间（示例：每天UTC 02:00 = 北京时间10:00）
  # schedule: 
  #   - cron: '0 2 * * *'
  workflow_dispatch:
  repository_dispatch: #允许外部触发,cf worker定时任务延迟在1分钟以内
    types: [tvcron]
jobs:
  main:
    name: Fetch And Modify
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 允许推送代码
    env:
      ONLY_UPDATE_MIGU: false    # 该变量已不影响逻辑，仅保留兼容

    steps: 
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: pip install requests

    # ---  Migu 处理---
    - name: Process Migu Files
      continue-on-error: true     # 即使失败也会继续执行后续块 
      run: |
        wget https://github.com/ioptu/migu_video/raw/refs/heads/main/migu.txt -O mig.txt -t 2 --waitretry=5
        python ./scripts/deduplicate.py -i mig.txt -o mig_d.txt
        python ./scripts/m3u_mergerng.py -i mig_d.txt -o mig_d.txt
        python ./scripts/m3u_merger.py -i mig_d.txt -o mig_d.txt
        
    # --- pluto&rakuten 源处理  ---
    - name: Process pluto&rakuten Files
      continue-on-error: true
      run: |
            wget https://iptv-org.github.io/iptv/index.m3u -O io.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input io.txt --output io.txt --eoru 'pluto,pluto' -n
            python ./scripts/m3u_merger.py -i io.txt -o io_merged.txt
            wget https://github.com/482349841209/rakuten-m3u-generator/raw/refs/heads/master/output/rakuten.m3u -O rkt.txt  -t 2 --waitretry=5
            
    # --- httop 源处理  ---
    - name: Process httop Files
      continue-on-error: true
      run: |
            wget https://httop.top/hotel.m3u -O hp.txt  -t 2 --waitretry=5
            python ./scripts/m3u_merger.py -i hp.txt -o hp_merged.txt
            python ./scripts/url_sortergr.py -i hp_merged.txt -o hp_merged.txt -gr '央视,卫视,其它' -gs
            
    # --- hotel 源处理 ---
    - name: Process hotel Files
      continue-on-error: true
      run: |
            wget http://120.27.21.75:20085/sub?biWVtPA3=txt -O htl.txt  -t 2 --waitretry=5
            python ./scripts/m3u_merger.py -i htl.txt -o htl_merged.txt
            python ./scripts/url_sortergr.py -i htl_merged.txt -o htl_merged.txt -gr '央视,卫视,其他' -gs            
            
    # --- iptv 源处理 ---
    - name: Process iptv Files
      continue-on-error: true
      run: |
            wget https://github.com/ioptu/migu_video/raw/refs/heads/main/iptv.txt -O ip.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input ip.txt --output ip.txt --eoru ',/dsdqca/' -n -r
            python ./scripts/m3u_merger.py -i ip.txt -o ip_merged.txt
            python ./scripts/url_sortergr.py -i ip_merged.txt -o ip_merged.txt -gr '央视,卫视,其他' -gs

    # --- guovin 源处理  ---
    - name: Process guovin Files
      continue-on-error: true
      run: |
            wget https://raw.githubusercontent.com/Guovin/iptv-api/refs/heads/gd/output/result.m3u -O gop.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input gop.txt --output gop.txt --eoru ',//38.75.136.137' -n
            python ./scripts/extract.py --input gop.txt --output gop.txt --eoru '更新时间,' -n -r
            python ./scripts/url_sorter.py -i gop.txt -o gop.txt -k "cctv5p" -ch "CCTV" -rn "CCTV5+" 
            python ./scripts/add_channel.py -i gop.txt -o gop.txt -r -a "五星体育,http://38.75.136.137:98/gslb/dsdqpub/wxtyhd.m3u8?auth=testpub;天津体育,http://38.75.136.137:98/gslb/dsdqpub/tjtv5.m3u8?auth=testpub"
            python ./scripts/m3u_merger.py -i gop.txt -o gop_merged.txt
            python ./scripts/deduplicate.py -i gop_merged.txt -o gop_merged.txt

    # ---  huuc 源处理  ---
    - name: Process luuc Files
      continue-on-error: true
      run: |
            wget https://raw.githubusercontent.com/lwzlinyi/ziyong/refs/heads/main/live2.m3u -O live2.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input live2.txt --output t1op.txt --eoru ',huuc' -n
            python ./scripts/deduplicate.py -i t1op.txt -o t1output.txt 
            
    # ---  lnott 源处理  ---
    - name: Process lnott Files
      continue-on-error: true
      run: |
            wget http://www.lyyytv.cn/yt/zhibo/1.txt -O 1.txt -t 2 --waitretry=5
            python ./scripts/extract.py --input 1.txt --output t2op.txt --eoru ',lnott' -n
            python ./scripts/deduplicate.py -i t2op.txt -o t2output.txt

    # ---  101.qzz.io 源处理  ---
    - name: Process 101.qzz.io Files
      continue-on-error: true
      run: |
            wget https://github.com/yishilaoxia/laoxia/raw/47a5dc7302327265fcf2610ae0951d1e41d6d0b4/output/gtdl0116.txt -O gtd.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input gtd.txt --output tv4output.txt --eoru ',cdn6.101.qzz.io' -n
            
    # --- 港澳频道 Files ---
    - name: Process 港澳频道 Files
      continue-on-error: true
      run: |
            wget https://github.com/ioptu/migu_video/raw/ea459c3e6ce43d99aca23ef4524e649c7d71394d/%E6%B8%AF%E6%BE%B3%E9%A2%91%E9%81%93.txt -O hm.txt  -t 2 --waitretry=5
            python ./scripts/m3u_merger.py -i hm.txt -o tv5op_merged.txt
            
    # --- qqqtv 源处理  ---
    - name: Process Lite Files
      continue-on-error: true
      run: |
            wget https://github.com/xiaoran29/core/raw/refs/heads/main/output/lite.m3u -O lite.txt  -t 2 --waitretry=5
            python ./scripts/extract.py --input lite.txt --output t3o.txt --eoru ',qqqtv' -n
            python ./scripts/url_sorter.py -i t3o.txt -o t3op.txt -k "CCTV-5%2B" -ch "CCTV5" -rn "CCTV5+" 
            python ./scripts/m3u_merger.py -i t3op.txt -o t3op_merged.txt
            python ./scripts/url_sorter.py -i t3op_merged.txt -o t3op_ms.txt -k 'HD&auth=666858,auth=66615415'

    # --- Catvod 处理 ---
    - name: Process Catvod Files
      continue-on-error: true
      run: |
        wget https://github.com/xiaoran29/core/raw/refs/heads/main/output/lite.m3u -O lite2.txt -t 2 --waitretry=5
        python ./scripts/extract.py --input lite2.txt --output t3op2.txt --eoru ',catvod.com' -n 
        python ./scripts/m3u_merger.py -i t3op2.txt -o t3op2_merged.txt
        python ./scripts/url_sorter.py -i t3op2_merged.txt -o t3op2_ms.txt -k 'CCTV-' -r
        
    # --- 汇总处理 ---
    - name: Final Merge 1
      continue-on-error: true
      run: |
        python ./scripts/m3u_merger.py -i t3op2_ms.txt mig_d.txt huuc_ipv6.txt sh.lnott.top.txt cdn6.101.qzz.io.txt -o t0op_m.txt
        python ./scripts/url_sorter.py -i t0op_m.txt -o t0op_ms.txt -k "catvod,luuc,miguvideo"
        python ./scripts/url_sorter.py -i t0op_ms.txt -o t0op_ms.txt -k "CCTV-" -r
        
    - name: Final Merge 2
      continue-on-error: true
      run: |       
        python ./scripts/url_sortergr.py -i t0op_m.txt -o ttvop_m.txt -gr "央视" -rg "央视" 
        python ./scripts/url_sortergr.py -i ttvop_m.txt -o ttvop_m.txt -gr "卫视" -rg "卫视" 
        python ./scripts/m3u_merger.py -i ttvop_m.txt -o ttvop_m.txt 
        python ./scripts/url_sorter.py -i ttvop_m.txt -o ttvop_ms.txt -k "catvod,luuc,miguvideo" 
        python ./scripts/url_sorter.py -i ttvop_ms.txt -o ttvop_ms.txt -k "CCTV-" -r 

    # --- 提交推送 ---
    - name: CommitAndPush
      run: |
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        git config --global user.email "github@github.com"
        git config --global user.name "Github Actions"
        
        git clone "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        cd "$REPO_NAME" || exit 1 

        # 移动所有文件（不再判断 ONLY_UPDATE_MIGU）
        [ -f ../mig_d.txt ] && mv ../mig_d.txt ./migu.txt || echo "migu skip"
        [ -f ../t1output.txt ] && mv ../t1output.txt ./huuc_ipv6.txt || true
        [ -f ../t2output.txt ] && mv ../t2output.txt ./sh.lnott.top.txt || true          
        [ -f ../tv4output.txt ] && mv ../tv4output.txt ./cdn6.101.qzz.io.txt || true
        [ -f ../tv4output_merged.txt ] && mv ../tv4output_merged.txt ./cdn6.101.qzz.io_merged.txt || true
        [ -f ../t3op.txt ] && mv ../t3op.txt ./yp.qqqtv.top.txt || true
        [ -f ../t3op_ms.txt ] && mv ../t3op_ms.txt ./yp.qqqtv.top_merged.txt || true
        [ -f ../t3op2.txt ] && mv ../t3op2.txt ./catvod.com.txt || true
        [ -f ../t3op2_ms.txt ] && mv ../t3op2_ms.txt ./catvod.com_merged.txt || true
        [ -f ../t0op_ms.txt ] && mv ../t0op_ms.txt ./tv_merged.txt || true
        [ -f ../ttvop_ms.txt ] && mv ../ttvop_ms.txt ./ttv_merged.txt || true
        [ -f ../tv5op_merged.txt ] && mv ../tv5op_merged.txt ./港澳_merged.txt || true
        
        # 优化：避免文件覆盖，优先使用httop源，若不存在再用hotel源
        if [ -f ../hp.txt ]; then
          mv ../hp.txt ./httop.txt
          mv ../hp_merged.txt ./httop_merged.txt || true
        elif [ -f ../htl.txt ]; then
          mv ../htl.txt ./httop.txt
          mv ../htl_merged.txt ./httop_merged.txt || true
        fi
        
        # 优化：避免文件覆盖，优先使用guovin源，若不存在再用iptv源
        if [ -f ../gop.txt ]; then
          mv ../gop.txt ./iptv.txt
          mv ../gop_merged.txt ./iptv_merged.txt || true
        elif [ -f ../ip.txt ]; then
          mv ../ip.txt ./iptv.txt
          mv ../ip_merged.txt ./iptv_merged.txt || true
        fi
        
        [ -f ../io.txt ] && mv ../io.txt ./plutotv.txt || true
        [ -f ../io_merged.txt ] && mv ../io_merged.txt ./plutotv_merged.txt || true
        [ -f ../rkt.txt ] && mv ../rkt.txt ./rakutentv.txt || true

        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Full Update: $(date +'%Y-%m-%d %H:%M:%S') UTC (txt format)"
          git push origin main
        fi
